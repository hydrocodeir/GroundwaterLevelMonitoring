services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pizo-dashboard:latest
    container_name: pizo-dashboard
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${APP_PORT:-8228}:8228"
    volumes:
      - ./Data:/app/Data:ro
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          response = urllib.request.urlopen("http://127.0.0.1:8228/health", timeout=5);
          raise SystemExit(0 if response.status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    stop_grace_period: 30s
